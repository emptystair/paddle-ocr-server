services:
  ocr-server:
    build:
      context: ..
      dockerfile: cloud/Dockerfile
    container_name: paddle_v4_trt_cloud_server_v4models
    ports:
      - "8004:8000"
    volumes:
      - /mnt/models/wake-county-pdfs:/data:ro
      - trt_cache_v4:/app/trt_cache
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - NUM_WORKERS=1
      - NUM_ENGINES=1
      - DPI=100
      - INSTANCE_ID=v4_tensorrt
      - REC_BATCH_SIZE=1
      - DET_MODEL_PATH=/app/models/PP-OCRv4/ch_PP-OCRv4_det_infer.onnx
      - REC_MODEL_PATH=/app/models/PP-OCRv4/ch_PP-OCRv4_rec_infer.onnx
      - REC_KEYS_PATH=/app/models/PP-OCRv4/ppocr_keys_v1.txt
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  trt_cache_v4:
    name: paddle_v4_trt_cloud_cache_v4
